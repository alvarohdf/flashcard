<!DOCTYPE html>
<html lang="pt-br">
<head>
  <meta charset="UTF-8">
  <title>Gerador Cards v2.7</title>

  <style>
    body { font-family: Arial; margin: 20px; }
    textarea { width: 100%; height: 150px; margin-bottom: 5px; }
    button { padding: 10px; font-size: 16px; }
    .contador { font-size: 14px; color: #555; margin-bottom: 15px; }
  </style>
</head>

<body>

<h2>Entrada</h2>
<textarea id="entrada"></textarea>

<button id="btnGerar">Gerar</button>
<button id="btnExportar">Exportar</button>

<h2>Saída (Cards)</h2>
<textarea id="saida"></textarea>

<h2>Markdown Final</h2>
<textarea id="markdownFinal"></textarea>
<div class="contador" id="contadorEntrada">Caracteres Entrada: 0</div>
<div class="contador" id="contadorMarkdown">Caracteres Markdown Final: 0</div>
<div class="contador" id="contadorCards">Caracteres a mais esperado: 0</div>
<div class="contador" id="sepMc">Separador múltiplos clozes: ;</div>

<script src="codigo.js"></script>

<script>
document.getElementById("btnGerar").addEventListener("click", function() {
  const texto = document.getElementById("entrada").value;

  const resultado = criarCartoes(texto);

  document.getElementById("saida").value = resultado.cards;
  document.getElementById("markdownFinal").value = resultado.markdown;
  document.getElementById("contadorCards").innerText = "Caracteres a mais esperado: " + resultado.contagem;

  atualizarContadores();
});

document.getElementById("btnExportar").addEventListener("click", function() 
{
  const texto = document.getElementById("saida").value;
  if (!texto.trim()) {
    alert("Nada para exportar.");
    return;
  }

  exportarCSV(texto);
});


// FUNÇÃO PRA SELECIONAR TUDO AO CLICAR
function selecionarTudo(id) {
  const el = document.getElementById(id);
  
  el.addEventListener("click", function() {
    el.select();
  });

  el.addEventListener("focus", function() {
    el.select();
  });
}

selecionarTudo("saida");
selecionarTudo("markdownFinal");

// CONTADORES
function atualizarContadores() {
  const entrada = document.getElementById("entrada").value.length;
  const markdown = document.getElementById("markdownFinal").value.length;

  document.getElementById("contadorEntrada").innerText = "Caracteres Entrada: " + entrada;
  document.getElementById("contadorMarkdown").innerText = "Caracteres Markdown Final: " + markdown;
}

// atualizar enquanto digita
document.getElementById("entrada").addEventListener("input", atualizarContadores);

// inicial
atualizarContadores();
</script>

</body>
</html>
